---
defaults:
  - wandb: defaults
  - hydra: defaults
  - cam_embd: defaults
  - _self_
general:
  device: 0
  random_seed: 0
  num_devices: 1
  mixed_precision: false
data:
  training_resolution: 128
  subset: -1
  input_images: 1
  origin_distances: false
opt:
  iterations: 40000
  base_lr: 0.00005
  batch_size: 4
  betas:
    - 0.9
    - 0.999
  loss: l2
  imgs_per_obj: 4
  ema: 
    use: true
    update_every: 10
    update_after_step: 100
    beta: 0.9999
  lambda_lpips: 0.0
  lambda_er: 0.001
  lambda_pc: 0.001
  pretrained_ckpt: null

model:
  max_sh_degree: 1
  inverted_x: false
  inverted_y: true
  name: SingleUNet
  encoder_type: gwformer
  point_cloud_input: false
  gwformer_patch_size: 4
  gwformer_embed_dim: 96
  gwformer_depths:
  - 2
  - 2
  - 6
  - 2
  gwformer_num_heads:
  - 3
  - 6
  - 12
  - 24
  gwformer_window_size: 8
  gwformer_mlp_ratio: 4.0
  pdc_types:
  - cpdc
  - apdc
  - hpdc
  - vpdc
  use_wavelet_attention: true
  opacity_scale: 1.0
  opacity_bias: -2.0
  scale_bias: 0.02
  scale_scale: 0.003
  xyz_scale: 0.1
  xyz_bias: 0.0
  depth_scale: 1.0
  depth_bias: 0.0
  network_without_offset: false
  network_with_offset: true
  attention_resolutions:
  - 16
  num_blocks: 4
  cross_view_attention: true
  base_dim: 128
  isotropic: false
  er_tcnet:
    enabled: true
    training_stage: 3
    n_points: 256
    sample_points: 64
    point_hidden_dim: 256
    point_feat_dim: 64
    dgrb_radius: 0.1
    dgrb_n: 10
    dgrb_m: 1
    dgrb_k: 8
    embed_dim: 128
    cap_dim: 64
    num_heads: 4
    lambda_reg: 0.05
    n_iter: 3
    fusion_strength: 0.05
    fast_sampling: true

logging:
  ckpt_iterations: 1000
  val_log: 40000
  loss_log: 10
  loop_log: 10000
  render_log: 10000
